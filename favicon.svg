<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" rx="6" fill="#1A1A1A"/>

  <!-- Swiss Army Knife body (red handle) -->
  <rect x="6" y="13" width="20" height="6" rx="1.5" fill="#C8102E"/>

  <!-- Blade extended upward -->
  <polygon points="26,14 26,16 30,15" fill="#D0D0D0"/>

  <!-- Cross symbol on handle -->
  <rect x="11" y="14.5" width="3" height="3" rx="0.3" fill="white" opacity="0.9"/>
  <rect x="12" y="13.8" width="1" height="4.4" rx="0.3" fill="#C8102E"/>
  <rect x="10.5" y="15.3" width="4" height="1" rx="0.3" fill="#C8102E"/>

  <!-- Rivet details -->
  <circle cx="8.5" cy="16" r="1" fill="#A00020"/>
  <circle cx="23.5" cy="16" r="1" fill="#A00020"/>
</svg>
